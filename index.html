<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Portfólio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Portfólio</h1>
  <nav>
    <ul>
      <li><a href="#sobre">Sobre</a></li>
      <li><a href="#projetos">Projetos</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>
  <button class="dark-btn" onclick="toggleDarkMode()">Modo Escuro</button>
</header>

<main>

<section id="sobre" class="sobre-container">
  <div class="sobre-box">
    <img src="foto.jpg" alt="Foto" class="foto">

    <div class="sobre-texto">
      <h2>Daniel Santos</h2>
      <p class="cargo">Desenvolvedor Web em formação</p>
      <p>Estudante de Sistemas para Internet.</p>
    </div>
  </div>
</section>

<section id="projetos">
  <h2>Meus Projetos</h2>
  <div id="lista-projetos"></div>
</section>

<section id="contato">
  <h2>Contato</h2>

  <form id="form-contato">
    <label>Nome:</label>
    <input type="text" id="nome" required>

    <label>E-mail:</label>
    <input type="email" id="email" required>

    <label>Mensagem:</label>
    <textarea id="mensagem" required></textarea>

    <button type="submit">Enviar Mensagem</button>
  </form>

  <p id="status-msg"></p>
</section>

</main>

<footer>
  <p>© 2026 - Desenvolvido por Daniel Santos</p>
</footer>

<script src="script.js"></script>

</body>
</html>
